services:
  - type: web
    name: recommendation-camp-helper
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATA_DIR
        value: /var/data
    disk:
      name: recommendation-camp-data
      mountPath: /var/data
      sizeGB: 1
